name: AssetFlow ERP CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'assetflow-server/package-lock.json'
      - name: Install dependencies
        run: |
          cd assetflow-server
          npm ci
      - name: Build server
        run: |
          cd assetflow-server
          npm run build

  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'assetflow-client/package-lock.json'
      - name: Install dependencies
        run: |
          cd assetflow-client
          npm ci
      - name: Build client
        run: |
          cd assetflow-client
          npm run build
